<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minigolf-App – Online</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; margin:20px; }
svg { border:1px solid #444; background:#f0f0f0; margin-top:10px; }
.note { font-size:8px; fill:blue; text-anchor:middle; dominant-baseline:middle; }
.position-btn { fill:#D2B48C; stroke:#333; cursor:pointer; }
.menu { position:absolute; background:white; border:1px solid #333; padding:5px; display:grid; grid-template-columns:repeat(4,auto); gap:5px; }
</style>
</head>
<body>

<h2>Minigolf-App</h2>

<button id="saveBtn">💾 Speichern</button>

<svg width="400" height="400" viewBox="0 0 200 200">
<circle cx="100" cy="100" r="80" fill="#ccc"/>
<circle cx="100" cy="100" r="10" fill="black"/>
<g id="lines"></g>
<g id="positions"></g>
</svg>

<script>

// 🔥 HIER DEINE FIREBASE DATEN EINSETZEN
const firebaseConfig = {
  apiKey: "HIER",
  authDomain: "HIER",
  projectId: "HIER"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================

const center={x:100,y:100};
const radius=80;
const holeRadius=10;
const positionsCount=12;

const selectionOptions={
  "0":"Gerade",
  "L1":"leicht links",
  "L2":"links",
  "R1":"leicht rechts",
  "R2":"rechts"
};

let data={};

const lines=document.getElementById("lines");
const positions=document.getElementById("positions");

// 🔹 ONLINE LADEN
async function load(){
  const doc = await db.collection("app").doc("data").get();
  if(doc.exists) data = doc.data();
  draw();
}

// 🔹 ONLINE SPEICHERN
async function save(){
  await db.collection("app").doc("data").set(data);
  alert("Online gespeichert!");
}

document.getElementById("saveBtn").onclick=save;

function draw(){
  positions.innerHTML="";
  lines.innerHTML="";

  for(let i=0;i<positionsCount;i++){
    const angle=(i*30-90)*Math.PI/180;
    const x=center.x+radius*Math.cos(angle);
    const y=center.y+radius*Math.sin(angle);

    const btn=document.createElementNS("http://www.w3.org/2000/svg","circle");
    btn.setAttribute("cx",x);
    btn.setAttribute("cy",y);
    btn.setAttribute("r",8);
    btn.setAttribute("class","position-btn");

    btn.onclick=(e)=>openMenu(e.pageX,e.pageY,i);

    positions.appendChild(btn);
  }

  for(let i in data){
    const sel=data[i];
    if(!sel) continue;

    const angle=(i*30-90)*Math.PI/180;
    const startX=center.x+radius*Math.cos(angle);
    const startY=center.y+radius*Math.sin(angle);

    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",startX);
    line.setAttribute("y1",startY);
    line.setAttribute("x2",100);
    line.setAttribute("y2",100);
    line.setAttribute("stroke","red");
    lines.appendChild(line);
  }
}

function openMenu(x,y,i){
  const menu=document.createElement("div");
  menu.className="menu";
  menu.style.left=x+"px";
  menu.style.top=y+"px";

  Object.keys(selectionOptions).forEach(key=>{
    const b=document.createElement("button");
    b.textContent=key;
    b.onclick=()=>{
      data[i]=key;
      draw();
      menu.remove();
    };
    menu.appendChild(b);
  });

  document.body.appendChild(menu);

  setTimeout(()=>{
    document.addEventListener("click",function h(e){
      if(!menu.contains(e.target)){
        menu.remove();
        document.removeEventListener("click",h);
      }
    });
  },10);
}

// START
load();

</script>

</body>
</html>
