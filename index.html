<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minigolf-Abt.1 – Browser-Version</title>
<style>
body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; margin:20px; }
svg { border:1px solid #444; background:#f0f0f0; margin-top:10px; }
.position { cursor:pointer; font-size:10px; text-anchor:middle; dominant-baseline:middle; }
.note { font-size:9px; fill:blue; }
label { margin-top:10px; font-weight:bold; }
button { margin:5px; }
</style>
</head>
<body>

<h2>Minigolf-Abt.1 – Bahn wechseln</h2>

<div>
  <button id="prevBowl">‹ Bahn vorher</button>
  <span id="bowlLabel">Bahn 1 / 18</span>
  <button id="nextBowl">Bahn nächste ›</button>
</div>

<div>
  <button id="saveBtn">💾 Speichern</button>
</div>

<label>
  <input type="checkbox" id="toggleView" checked>
  Notizen & Linien anzeigen
</label>

<svg id="endcircle" width="400" height="400" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="80" fill="#c0c0c0" stroke="#555" stroke-width="2"/>
  <circle cx="100" cy="100" r="10" fill="black"/>
  <g id="lines"></g>
  <g id="positions"></g>
</svg>

<script>
const center = {x:100, y:100};
const radius = 80;
const holeRadius = 10;
const positionsCount = 12;
const totalBowls = 18;

const selectionOptions = {
  "0": "Gerade ins Loch",
  "L1": "leicht links im Loch",
  "L2": "links im Loch",
  "L3": "linker Lochrand",
  "R1": "leicht rechts im Loch",
  "R2": "rechts im Loch",
  "R3": "rechter Lochrand"
};

const bowlsData = [];
for(let i=0;i<totalBowls;i++) bowlsData.push({});

let currentBowl = 0;

const linesGroup = document.getElementById("lines");
const positionsGroup = document.getElementById("positions");
const toggleView = document.getElementById("toggleView");
const bowlLabel = document.getElementById("bowlLabel");

function getAngleRad(i){ return (i * 30 - 90) * Math.PI / 180; }

function loadData(){
  const saved = localStorage.getItem("minigolfSave");
  if(!saved) return;
  const parsed = JSON.parse(saved);
  for(let i=0;i<totalBowls;i++){ bowlsData[i] = parsed[i] || {}; }
}

function calculateTarget(selection, angleRad){
  const startX = center.x + radius*Math.cos(angleRad);
  const startY = center.y + radius*Math.sin(angleRad);
  const dirX = center.x - startX;
  const dirY = center.y - startY;
  const length = Math.sqrt(dirX*dirX + dirY*dirY);
  const normX = dirX/length;
  const normY = dirY/length;
  const step = holeRadius/3;
  let offset=0;
  switch(selection){
    case "0": offset=0; break;
    case "L1": offset=-step; break;
    case "L2": offset=-2*step; break;
    case "L3": offset=-3*step; break;
    case "R1": offset=step; break;
    case "R2": offset=2*step; break;
    case "R3": offset=3*step; break;
  }
  const perpX = -normY;
  const perpY = normX;
  return { x: center.x + offset*perpX, y: center.y + offset*perpY };
}

function drawPositions(){
  positionsGroup.innerHTML = '';
  for(let i=0;i<positionsCount;i++){
    const angle = getAngleRad(i);
    const x = center.x + radius*Math.cos(angle);
    const y = center.y + radius*Math.sin(angle);
    const pos = document.createElementNS("http://www.w3.org/2000/svg","text");
    pos.setAttribute("x", x);
    pos.setAttribute("y", y);
    pos.setAttribute("class","position");
    pos.textContent = (i===0?"12":i);
    pos.addEventListener("click", ()=>{
      const data = bowlsData[currentBowl];
      const current = data[i];
      let selection = prompt(
        (current ? `Aktuell: ${selectionOptions[current]}\n` : "") +
        "Wähle:\n" + Object.keys(selectionOptions).join(", ")
      );
      if(!selection){ delete data[i]; }
      else if(selectionOptions[selection]){ data[i] = selection; }
      else { alert("Ungültige Auswahl!"); return; }
      updateBowl();
    });
    positionsGroup.appendChild(pos);
  }
}

function updateBowl(){
  linesGroup.innerHTML = '';
  positionsGroup.querySelectorAll('.note').forEach(n=>n.remove());
  bowlLabel.textContent = `Bahn ${currentBowl+1} / ${totalBowls}`;
  const data = bowlsData[currentBowl];
  for(let i in data){
    const sel = data[i];
    const angleRad = getAngleRad(i);
    const startX = center.x + radius*Math.cos(angleRad);
    const startY = center.y + radius*Math.sin(angleRad);
    const target = calculateTarget(sel, angleRad);
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", startX);
    line.setAttribute("y1", startY);
    line.setAttribute("x2", target.x);
    line.setAttribute("y2", target.y);
    line.setAttribute("stroke","rgba(255,0,0,0.6)");
    line.setAttribute("stroke-width","1");
    line.style.display = toggleView.checked?"block":"none";
    linesGroup.appendChild(line);
    const noteDist = radius*0.6;
    const noteX = center.x + noteDist*Math.cos(angleRad);
    const noteY = center.y + noteDist*Math.sin(angleRad);
    const note = document.createElementNS("http://www.w3.org/2000/svg","text");
    note.setAttribute("x", noteX);
    note.setAttribute("y", noteY);
    note.setAttribute("class","note");
    note.textContent = selectionOptions[sel];
    note.style.display = toggleView.checked?"block":"none";
    positionsGroup.appendChild(note);
  }
  localStorage.setItem("minigolfSave", JSON.stringify(bowlsData));
}

document.getElementById("prevBowl").addEventListener("click", ()=>{
  if(currentBowl>0) currentBowl--; updateBowl();
});
document.getElementById("nextBowl").addEventListener("click", ()=>{
  if(currentBowl<totalBowls-1) currentBowl++; updateBowl();
});
toggleView.addEventListener("change", updateBowl);
document.getElementById("saveBtn").addEventListener("click", ()=>{
  localStorage.setItem("minigolfSave", JSON.stringify(bowlsData));
  alert("Gespeichert!");
});

// Start
loadData();
drawPositions();
updateBowl();
</script>

</body>
</html>
