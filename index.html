<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minigolf-App – Online</title>

<style>
body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; margin:20px; }
svg { border:1px solid #444; background:#f0f0f0; margin-top:10px; }
.note { font-size:8px; fill:blue; text-anchor:middle; dominant-baseline:middle; }
button { margin:5px; cursor:pointer; }
.position-btn { fill:#D2B48C; stroke:#333; stroke-width:1; cursor:pointer; }

.menu {
  position:absolute;
  background:white;
  border:1px solid #333;
  padding:6px;
  display:grid;
  grid-template-columns: repeat(4, auto);
  gap:5px;
  z-index:1000;
}

.toggle-visibility { grid-column: span 4; }

#devBanner {
  margin:10px;
  font-weight:bold;
  color:white;
  background:#444;
  padding:5px 10px;
  border-radius:5px;
  display:none;
}
</style>
</head>

<body>

<h2>Minigolf-App – Online</h2>
<div id="devBanner">🛠 Entwicklermodus aktiv</div>

<div>
  <button id="prevBowl">‹</button>
  <span id="bowlLabel">Bahn 1 / 18</span>
  <button id="nextBowl">›</button>
</div>

<div>
  <button id="saveBtn">💾 Speichern</button>
</div>

<label>
  <input type="checkbox" id="toggleView" checked>
  Linien anzeigen
</label>

<svg width="400" height="400" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="80" fill="#c0c0c0"/>
  <circle cx="100" cy="100" r="10" fill="black"/>
  <g id="lines"></g>
  <g id="positions"></g>
</svg>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 HIER DEINE FIREBASE CONFIG EINTRAGEN */
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  projectId: "DEIN_PROJEKT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= APP LOGIK ================= */

const isDev = window.location.search.includes("dev=true");
if(isDev) document.getElementById("devBanner").style.display="block";

const center={x:100,y:100};
const radius=80;
const holeRadius=10;
const positionsCount=12;
const totalBowls=18;

const selectionOptions={
  "0":"Gerade ins Loch",
  "L1":"leicht links im Loch",
  "L2":"links im Loch",
  "L3":"linker Lochrand",
  "R1":"leicht rechts im Loch",
  "R2":"rechts im Loch",
  "R3":"rechter Lochrand"
};

/* 🔥 Datenstruktur */
let bowlsData = Array.from({length: totalBowls}, () =>
  Array.from({length: positionsCount}, () => ({
    sel:null, visible:true, note:""
  }))
);

let currentBowl=0;

const linesGroup=document.getElementById("lines");
const positionsGroup=document.getElementById("positions");
const bowlLabel=document.getElementById("bowlLabel");
const toggleView=document.getElementById("toggleView");

function getAngleRad(i){return(i*30-90)*Math.PI/180;}

function calculateTarget(sel,angle){
  const startX=center.x+radius*Math.cos(angle);
  const startY=center.y+radius*Math.sin(angle);
  const dx=center.x-startX;
  const dy=center.y-startY;
  const len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len, ny=dy/len;
  const step=holeRadius/3;

  let offset=0;
  if(sel==="L1") offset=-step;
  if(sel==="L2") offset=-2*step;
  if(sel==="L3") offset=-3*step;
  if(sel==="R1") offset=step;
  if(sel==="R2") offset=2*step;
  if(sel==="R3") offset=3*step;

  return {x:center.x+(-ny)*offset,y:center.y+(nx)*offset};
}

/* ================= FIREBASE ================= */

const docRef = doc(db, "minigolf", "global");

async function saveToCloud(){
  if(!isDev) return;
  await setDoc(docRef,{bowlsData});
  alert("Gespeichert!");
}

async function loadFromCloud(){
  const snap = await getDoc(docRef);
  if(snap.exists()){
    bowlsData = snap.data().bowlsData;
    updateBowl();
  }
}

/* 🔥 LIVE UPDATES */
onSnapshot(docRef,(snap)=>{
  if(snap.exists()){
    bowlsData = snap.data().bowlsData;
    updateBowl();
  }
});

/* ================= UI ================= */

function showMenu(x,y,i){
  const d = bowlsData[currentBowl][i];

  const menu=document.createElement("div");
  menu.className="menu";
  menu.style.left=Math.min(x,window.innerWidth-150)+"px";
  menu.style.top=Math.min(y,window.innerHeight-150)+"px";

  if(isDev){
    Object.keys(selectionOptions).forEach(key=>{
      const btn=document.createElement("button");
      btn.textContent=key;
      btn.onclick=()=>{
        d.sel=key;
        updateBowl();
        menu.remove();
      };
      menu.appendChild(btn);
    });
  }

  const toggleBtn=document.createElement("button");
  toggleBtn.className="toggle-visibility";
  toggleBtn.textContent=d.visible?"👁 Sichtbar":"🚫 Unsichtbar";
  toggleBtn.onclick=()=>{
    d.visible=!d.visible;
    toggleBtn.textContent=d.visible?"👁 Sichtbar":"🚫 Unsichtbar";
    updateBowl();
  };
  menu.appendChild(toggleBtn);

  const noteInput=document.createElement("input");
  noteInput.value=d.note;
  noteInput.placeholder="Notiz";
  noteInput.readOnly=!isDev;
  noteInput.onchange=()=>{
    d.note=noteInput.value;
    updateBowl();
  };
  menu.appendChild(noteInput);

  document.body.appendChild(menu);

  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!menu.contains(e.target)){
        menu.remove();
        document.removeEventListener("click",handler);
      }
    });
  },10);
}

function drawPositions(){
  for(let i=0;i<positionsCount;i++){
    const angle=getAngleRad(i);
    const x=center.x+radius*Math.cos(angle);
    const y=center.y+radius*Math.sin(angle);

    const btn=document.createElementNS("http://www.w3.org/2000/svg","circle");
    btn.setAttribute("cx",x);
    btn.setAttribute("cy",y);
    btn.setAttribute("r",8);
    btn.setAttribute("class","position-btn");

    btn.onclick=(e)=>showMenu(e.pageX,e.pageY,i);

    positionsGroup.appendChild(btn);
  }
}

function updateBowl(){
  linesGroup.innerHTML="";
  positionsGroup.querySelectorAll(".note").forEach(n=>n.remove());

  bowlLabel.textContent=`Bahn ${currentBowl+1} / ${totalBowls}`;

  const data=bowlsData[currentBowl];

  data.forEach((obj,i)=>{
    if(!obj.sel) return;

    const angle=getAngleRad(i);
    const startX=center.x+radius*Math.cos(angle);
    const startY=center.y+radius*Math.sin(angle);
    const target=calculateTarget(obj.sel,angle);

    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",startX);
    line.setAttribute("y1",startY);
    line.setAttribute("x2",target.x);
    line.setAttribute("y2",target.y);
    line.setAttribute("stroke","red");
    line.style.display=(obj.visible&&toggleView.checked)?"block":"none";

    linesGroup.appendChild(line);

    const note=document.createElementNS("http://www.w3.org/2000/svg","text");
    note.setAttribute("x",center.x+radius*0.6*Math.cos(angle));
    note.setAttribute("y",center.y+radius*0.6*Math.sin(angle));
    note.setAttribute("class","note");
    note.textContent=obj.note||selectionOptions[obj.sel];
    note.style.display=obj.visible?"block":"none";

    positionsGroup.appendChild(note);
  });
}

/* ================= EVENTS ================= */

document.getElementById("prevBowl").onclick=()=>{if(currentBowl>0) currentBowl--;updateBowl();};
document.getElementById("nextBowl").onclick=()=>{if(currentBowl<totalBowls-1) currentBowl++;updateBowl();};
document.getElementById("saveBtn").onclick=saveToCloud;
toggleView.onchange=updateBowl;

if(!isDev){
  document.getElementById("saveBtn").style.display="none";
}

/* START */
drawPositions();
loadFromCloud();

</script>

</body>
</html>
