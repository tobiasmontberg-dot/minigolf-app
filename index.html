<!DOCTYPE html>
<html lang="de">
<head>

<!-- Firebase Scripts -->

<style>
body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; margin:20px; }
svg { border:1px solid #444; background:#f0f0f0; margin-top:10px; transition: transform 0.4s; }
button { margin:5px; cursor:pointer; }
.position-btn { stroke:#333; stroke-width:1; cursor:pointer; }
.menu { position:absolute; background:white; border:1px solid #333; padding:6px; display:grid; grid-template-columns: repeat(4, auto); gap:5px; z-index:1000; }
.toggle-visibility { grid-column: span 4; }
#devBanner { margin:10px; font-weight:bold; color:white; background:#444; padding:5px 10px; border-radius:5px; display:none; }
#bowlLabel { display:inline-block; transition: color 0.2s; }
/* kleiner runder Button wie die Pfeile, kleinere Schrift, weniger Schatten */
.small-nav-btn {
  min-width: 80px; height: 45px; font-size: 14px; font-weight: bold;
  border-radius: 50px; background: linear-gradient(145deg, #f0f0f0, #cacaca);
  box-shadow: 3px 3px 6px rgba(0,0,0,0.2), -2px -2px 5px rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
  transition: all 0.2s ease; padding: 0 10px; border: none;
}
.small-nav-btn:hover { transform: scale(1.1); box-shadow: 4px 4px 8px rgba(0,0,0,0.25), -3px -3px 6px rgba(255,255,255,0.9); }
.small-nav-btn:active { transform: scale(0.95); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2), inset -2px -2px 4px rgba(255,255,255,0.7); }
.small-nav-btn span { display: inline-flex; align-items: center; gap: 4px; }
/* ================= NEUES NAV DESIGN ================= */
.bowl-nav { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
.nav-btn {
  width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 26px; font-weight: bold;
  cursor: pointer; background: linear-gradient(145deg, #f0f0f0, #cacaca);
  box-shadow: 6px 6px 12px rgba(0,0,0,0.2), -4px -4px 10px rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
}
.nav-btn:hover { transform: scale(1.1); box-shadow: 8px 8px 16px rgba(0,0,0,0.25), -4px -4px 10px rgba(255,255,255,0.9); }
.nav-btn:active { transform: scale(0.95); box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2), inset -4px -4px 8px rgba(255,255,255,0.7); }
.nav-btn span { display: inline-block; transform: translateY(-1px); }
#bowlLabel { font-size: 18px; font-weight: bold; min-width: 140px; text-align: center; }
/* ================= SAVE BUTTON POP + CHECK ================= */
@keyframes savePop {
  0%   { transform: scale(1); background: linear-gradient(145deg, #f0f0f0, #cacaca); color: black; }
  30%  { transform: scale(1.3); background-color: #009900; color: white; }
  60%  { transform: scale(1.1); background-color: #009900; color: white; }
  100% { transform: scale(1); background: linear-gradient(145deg, #f0f0f0, #cacaca); color: black; }
}
.save-pop { animation: savePop 0.6s ease-out forwards; }
.checkmark {
  position: absolute; font-size: 18px; color: white; background-color: #009900;
  border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0); z-index: 1000;
  transition: transform 0.3s ease-out, opacity 0.3s ease-out;
}
.checkmark.show { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }

/* ===== MODERNES ANLAGEN-DROPDOWN ===== */
.facility-wrapper { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; gap: 6px; }
.facility-wrapper label { font-size: 14px; font-weight: bold; color: #333; }
.custom-select { position: relative; width: 220px; }
.custom-select select {
  width: 100%; padding: 12px 45px 12px 18px; border-radius: 50px; border: none; font-size: 15px; font-weight: bold;
  appearance: none; cursor: pointer;
  background: linear-gradient(145deg, #f0f0f0, #cacaca);
  box-shadow: 5px 5px 10px rgba(0,0,0,0.2), -4px -4px 8px rgba(255,255,255,0.7);
  transition: all 0.2s ease;
}
.custom-select select:hover { transform: scale(1.05); }
.custom-select select:active { transform: scale(0.97); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2), inset -3px -3px 6px rgba(255,255,255,0.7); }
.custom-select select:focus { outline: none; box-shadow: 0 0 0 2px #FFA500; }
.custom-select::after { content: "▼"; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 12px; color: #333; }
/* ================= BILD BUTTONS ================= */
/* Kleiner grüner Button für Bild speichern */
.green-btn {
  background: linear-gradient(145deg, #28a745, #1e7e34);
  color: white;
  font-size: 0.85em;
  font-weight: bold;
  padding: 0 8px;      /* weniger horizontaler Abstand */
  height: 30px;        /* kleinere Höhe */
  border: none;
  border-radius: 50px;
  box-shadow: 3px 3px 6px rgba(0,0,0,0.2), -2px -2px 5px rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}
.green-btn:hover {
  transform: scale(1.05);
  box-shadow: 4px 4px 8px rgba(0,0,0,0.25), -3px -3px 6px rgba(255,255,255,0.9);
}

.red-btn {
  background: linear-gradient(145deg, #dc3545, #b02a37);
  color: white;
  font-size: 0.85em;
  font-weight: bold;
  padding: 0 8px;      /* weniger horizontaler Abstand */
  height: 30px;        /* kleinere Höhe */
  border: none;
  border-radius: 50px;
  box-shadow: 3px 3px 6px rgba(0,0,0,0.2), -2px -2px 5px rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}
.red-btn:hover {
  transform: scale(1.05);
  box-shadow: 4px 4px 8px rgba(0,0,0,0.25), -3px -3px 6px rgba(255,255,255,0.9);
}

/* Checkbox Linien anzeigen passend zum Label Anlage wählen */
.facility-label {
  font-size: 14px;
  font-weight: bold;
  color: #333;
  cursor: pointer;
}

</style>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBBBBmP24Lmn_JQDTK5CFD5F_Xy4c7IKzY",
  authDomain: "gelsenkirchen-bulmke.firebaseapp.com",
  projectId: "gelsenkirchen-bulmke",
  storageBucket: "gelsenkirchen-bulmke.firebasestorage.app",
  messagingSenderId: "890790425167",
  appId: "1:890790425167:web:27e65d0146e27ae283303a",
  measurementId: "G-KM719BR5BJ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("minigolf").doc("global");

// ================= APP =================
const isDev = window.location.search.includes("dev=true");
if(isDev) document.getElementById("devBanner").style.display="block";

const center={x:100,y:100};
const radius=80;
const holeRadius=10;
const positionsCount=12;
const totalBowls=18;
const selectionOptions={
  "0":"Gerade ins Loch",
  "L1":"leicht links im Loch",
  "L2":"links im Loch",
  "L3":"linker Lochrand",
  "R1":"leicht rechts im Loch",
  "R2":"rechts im Loch",
  "R3":"rechter Lochrand"
};

let allFacilities = {
  "1. MGC Gelsenkirchen": Array.from({length: totalBowls}, () => ({})),
  "VfM Bottrop": Array.from({length: totalBowls}, () => ({}))
};

let currentFacility = "1. MGC Gelsenkirchen";
let bowlsData = allFacilities[currentFacility];
let currentBowl = 0;

const linesGroup=document.getElementById("lines");
const positionsGroup=document.getElementById("positions");
const bowlLabel=document.getElementById("bowlLabel");
const facilitySelect = document.getElementById("facilitySelect");
facilitySelect.value = currentFacility;
facilitySelect.onchange = async (e) => {
  currentFacility = e.target.value;
  await loadPlan();
  await loadImage();
  updateBowl(); // Linien + Positionen korrekt setzen
};
const bowlNumberGroup=document.getElementById("bowlNumber");
const toggleView=document.getElementById("toggleView");

let userVisibility = JSON.parse(localStorage.getItem("minigolfVisibility")) || {};
function isVisible(bowlIndex, posIndex){ 
  return userVisibility[currentFacility]?.[bowlIndex]?.[posIndex] ?? false; 
}
function toggleVisibility(bowlIndex, posIndex){
  if(!userVisibility[currentFacility]) userVisibility[currentFacility]={};
  if(!userVisibility[currentFacility][bowlIndex]) userVisibility[currentFacility][bowlIndex]={};
  userVisibility[currentFacility][bowlIndex][posIndex] = !isVisible(bowlIndex,posIndex);
  localStorage.setItem("minigolfVisibility", JSON.stringify(userVisibility));
  updateBowl();
}

function getAngleRad(i){return(i*30-90)*Math.PI/180;}
async function loadData() {
  try {
    const snap = await docRef.get();
    if (snap.exists) {
      const data = snap.data().allFacilities;

      // Firestore-Daten existieren → alle Anlagen aktualisieren
      if (data) allFacilities = data;

      // Prüfen, ob currentFacility noch existiert
      if (!allFacilities[currentFacility]) {
        // Wenn nicht → erste Anlage aus Firestore nehmen
        currentFacility = Object.keys(allFacilities)[0];
        facilitySelect.value = currentFacility; // Auswahl im Dropdown synchronisieren
      }

      // Aktuelle Anlage laden
      bowlsData = allFacilities[currentFacility];
      updateBowl();
      return;
    }
  } catch (e) {
    console.log("Firebase Fehler, nutze LocalStorage", e);
  }

  // Fallback: LocalStorage oder initiale allFacilities
  const saved = localStorage.getItem("minigolfSave_" + currentFacility);
  if (saved) bowlsData = JSON.parse(saved);
  else bowlsData = allFacilities[currentFacility];

  updateBowl();
}

async function saveData() {
  if (!isDev) {
  localStorage.setItem("minigolfSave_" + currentFacility, JSON.stringify(bowlsData));
  return; // kein Alert, nur speichern
}
  allFacilities[currentFacility] = bowlsData;
  await docRef.set({ allFacilities });
  localStorage.setItem("minigolfSave_" + currentFacility, JSON.stringify(bowlsData));
  alert(`Online gespeichert für ${currentFacility}!`);
}

function calculateTarget(sel,angle){
  const startX=center.x+radius*Math.cos(angle);
  const startY=center.y+radius*Math.sin(angle);
  const dx=center.x-startX;
  const dy=center.y-startY;
  const len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len, ny=dy/len;
  const step=holeRadius/3;
  let offset=0;
  if(sel==="L1") offset=-step;
  if(sel==="L2") offset=-2*step;
  if(sel==="L3") offset=-3*step;
  if(sel==="R1") offset=step;
  if(sel==="R2") offset=2*step;
  if(sel==="R3") offset=3*step;
  return {x:center.x+(-ny)*offset,y:center.y+(nx)*offset};
}

// --- Key für Pistenplan pro Anlage/User ---
function getPlanKey(facility) {
  return `plan_${facility}_${userId}`;
}

// --- IndexedDB Funktionen für Pistenplan ---
async function savePlanToDB(facility, dataURL) {
  await openDB();
  return new Promise((resolve, reject) => {
    const tx = imageDB.transaction("images", "readwrite");
    const store = tx.objectStore("images");
    store.put({ id: getPlanKey(facility), data: dataURL });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

async function loadPlanFromDB(facility) {
  await openDB();
  return new Promise((resolve, reject) => {
    const tx = imageDB.transaction("images", "readonly");
    const store = tx.objectStore("images");
    const request = store.get(getPlanKey(facility));
    request.onsuccess = () => resolve(request.result?.data);
    request.onerror = e => reject(e);
  });
}

// ================= MENU =================
function showMenu(x,y,current,onSelect,posIndex,note,onEditNote){
  const menu=document.createElement("div");
  menu.className="menu";
  menu.style.left=x+"px"; menu.style.top=y+"px";

  if(isDev){
    Object.keys(selectionOptions).forEach(key=>{
      const btn=document.createElement("button");
      btn.textContent=key;
      if(key===current) btn.style.background="#ccc";
      btn.onclick=()=>{onSelect(key);updateBowl();menu.remove();};
      menu.appendChild(btn);
    });
  }

  const valueDisplay=document.createElement("div");
  valueDisplay.style.gridColumn="span 4"; valueDisplay.style.textAlign="center"; valueDisplay.style.fontWeight="bold";
  valueDisplay.textContent=current?`${current} – ${selectionOptions[current]}`:"Keine Auswahl";
  menu.appendChild(valueDisplay);

  const toggleBtn=document.createElement("button");
  toggleBtn.className="toggle-visibility";
  toggleBtn.textContent = isVisible(currentBowl,posIndex) ? "👁 Sichtbar" : "🚫 Unsichtbar";
  toggleBtn.onclick = () => { toggleVisibility(currentBowl,posIndex); toggleBtn.textContent = isVisible(currentBowl,posIndex) ? "👁 Sichtbar" : "🚫 Unsichtbar"; };
  menu.appendChild(toggleBtn);

  const noteInput=document.createElement("input");
  noteInput.value=note||""; noteInput.placeholder="Notiz"; noteInput.style.gridColumn="span 4"; noteInput.readOnly=!isDev;
  noteInput.onchange=()=>{if(isDev){onEditNote(noteInput.value);updateBowl();}};
  menu.appendChild(noteInput);

  document.body.appendChild(menu);
  setTimeout(()=>{document.addEventListener("click",function handler(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener("click",handler);}});},10);
}

// ================= POSITIONSZEICHNUNG =================
function drawPositions(){
  positionsGroup.innerHTML="";
  for(let i=0;i<positionsCount;i++){
    const angle = getAngleRad(i);
    const x = center.x + radius * Math.cos(angle);
    const y = center.y + radius * Math.sin(angle);

    const hitArea = document.createElementNS("http://www.w3.org/2000/svg","circle");
    hitArea.setAttribute("cx", x);
    hitArea.setAttribute("cy", y);
    hitArea.setAttribute("r", 22);
    hitArea.setAttribute("fill", "transparent");
    hitArea.style.cursor = "pointer";
    positionsGroup.appendChild(hitArea);

    const btn = document.createElementNS("http://www.w3.org/2000/svg","circle");
    btn.setAttribute("cx", x);
    btn.setAttribute("cy", y);
    btn.setAttribute("r", 10);
    btn.setAttribute("fill", "url(#btnGradient)");
    btn.setAttribute("stroke", "#222");
    btn.setAttribute("stroke-width", 1);
    btn.setAttribute("filter", "url(#btnShadow)");
    btn.style.cursor = "pointer";

    btn.addEventListener("mouseenter", ()=>{ btn.setAttribute("fill","url(#btnGradientHover)"); });
    btn.addEventListener("mouseleave", ()=>{ btn.setAttribute("fill","url(#btnGradient)"); });
    btn.addEventListener("mousedown", ()=>{ btn.setAttribute("fill","url(#btnGradientActive)"); });
    btn.addEventListener("mouseup", ()=>{ btn.setAttribute("fill","url(#btnGradientHover)"); });

    positionsGroup.appendChild(btn);

    const openMenu = (e)=>{
      const data = bowlsData[currentBowl];
      if(!data[i]) data[i] = {sel:null,note:""};
      const d = data[i];
      showMenu(e.pageX, e.pageY, d.sel, val => d.sel = val, i, d.note, n => d.note = n);
    };
    hitArea.onclick = openMenu;
    btn.onclick = openMenu;

    const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x", x);
    txt.setAttribute("y", y + 1);
    txt.setAttribute("font-size","7px");
    txt.setAttribute("text-anchor","middle");
    txt.setAttribute("dominant-baseline","middle");
    txt.textContent = (i===0 ? "12" : i);
    txt.style.pointerEvents = "none";
    positionsGroup.appendChild(txt);
  }
}

// ================= UPDATE BOWL =================
function drawBubble(x, y, text) {
  const bubbleGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
  bubbleGroup.setAttribute("transform", `scale(0)`); 
  bubbleGroup.setAttribute("opacity", "0");

  const padding = 6;
  const fontSize = 7;
  const svgWidth = 200, svgHeight = 200;
  const holeX = 100, holeY = 100, holeR = 10;

  const textElem = document.createElementNS("http://www.w3.org/2000/svg","text");
  textElem.setAttribute("font-size", fontSize); 
  textElem.setAttribute("dominant-baseline", "middle"); 
  textElem.setAttribute("text-anchor", "middle");
  textElem.textContent = text;
  bubbleGroup.appendChild(textElem);

  positionsGroup.appendChild(bubbleGroup);
  const bbox = textElem.getBBox();
  const rectWidth = bbox.width + padding*2;
  const rectHeight = bbox.height + padding*2;

  let side = (x < svgWidth/2) ? "right" : "left";
  let rectX = (side === "right") ? x + 8 : x - rectWidth - 8;
  rectX = Math.max(2, Math.min(rectX, svgWidth - rectWidth - 2));

  let rectY = y - rectHeight/2 - 8;
  const rectTop = rectY, rectBottom = rectY + rectHeight;
  const safety = 2;

  if(!(rectBottom < holeY - holeR - safety || rectTop > holeY + holeR + safety)) {
    if(rectY < holeY) rectY = holeY - holeR - rectHeight - safety;
    else rectY = holeY + holeR + safety;
  }

  textElem.setAttribute("x", rectX + rectWidth/2); 
  textElem.setAttribute("y", rectY + rectHeight/2);

  const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
  rect.setAttribute("x", rectX); rect.setAttribute("y", rectY); 
  rect.setAttribute("width", rectWidth); rect.setAttribute("height", rectHeight);
  rect.setAttribute("rx", 8); rect.setAttribute("ry", 8); 
  rect.setAttribute("fill", "#DCF8C6");
  rect.setAttribute("stroke", "#34B7F1"); rect.setAttribute("stroke-width", 0.5);
  bubbleGroup.insertBefore(rect, textElem);

  const tri = document.createElementNS("http://www.w3.org/2000/svg","polygon");
  const triSize = 6;
  let triPoints = (side==="right")
    ? [`${x},${y}`, `${x+triSize},${rectY + rectHeight - triSize}`, `${x+triSize},${rectY + rectHeight - triSize/2}`]
    : [`${x},${y}`, `${x-triSize},${rectY + rectHeight - triSize}`, `${x-triSize},${rectY + rectHeight - triSize/2}`];
  tri.setAttribute("points", triPoints.join(" "));
  tri.setAttribute("fill", "#DCF8C6"); tri.setAttribute("stroke", "#34B7F1"); tri.setAttribute("stroke-width", 0.5);
  bubbleGroup.appendChild(tri);

  setTimeout(() => {
    bubbleGroup.animate([
      { transform: 'scale(0)', opacity: 0 },
      { transform: 'scale(1.05)', opacity: 1 },
      { transform: 'scale(1)', opacity: 1 }
    ], { duration: 300, easing: 'ease-out', fill: 'forwards' });
  }, 0);

  return bubbleGroup;
}

// ================= BAHNNUMMER =================
function updateBowlNumber(){
  bowlNumberGroup.innerHTML = "";
  const numberGroup = document.createElementNS("http://www.w3.org/2000/svg","g");
  const x = 180;
  const y = 20;

  const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
  circle.setAttribute("cx", x);
  circle.setAttribute("cy", y);
  circle.setAttribute("r", 12); 
  circle.setAttribute("fill", "#C2A078"); 
  circle.setAttribute("stroke", "#222");
  circle.setAttribute("stroke-width", 1);
  numberGroup.appendChild(circle);

  const text = document.createElementNS("http://www.w3.org/2000/svg","text");
  text.setAttribute("x", x);
  text.setAttribute("y", y+1);
  text.setAttribute("text-anchor","middle");
  text.setAttribute("dominant-baseline","middle");
  text.setAttribute("font-size","11");
  text.setAttribute("fill","#FFF");
  text.style.fontWeight = "bold";
  text.textContent = currentBowl+1;
  numberGroup.appendChild(text);

  bowlNumberGroup.appendChild(numberGroup);
}

// ================= UPDATE BOWL =================
function updateBowl(){
  linesGroup.innerHTML="";
  positionsGroup.querySelectorAll(".bubble").forEach(n=>n.remove());
  bowlLabel.textContent=`Bahn ${currentBowl+1} / ${totalBowls}`;
  updateBowlNumber();

  const data=bowlsData[currentBowl];

  for(let i in data){
    const obj=data[i];
    if(!obj.sel) continue;
    const angle=getAngleRad(i);
    const startX=center.x+radius*Math.cos(angle);
    const startY=center.y+radius*Math.sin(angle);
    const target=calculateTarget(obj.sel,angle);

    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",startX); line.setAttribute("y1",startY);
    line.setAttribute("x2",target.x); line.setAttribute("y2",target.y);
    line.setAttribute("stroke","rgba(255,255,255,0.8)");
    line.setAttribute("stroke-width","1.5");
    line.style.display = (isVisible(currentBowl,i) && toggleView.checked) ? "block" : "none";
    linesGroup.appendChild(line);

    if(isVisible(currentBowl,i)){
      const bubble = drawBubble(center.x + radius*0.6*Math.cos(angle), center.y + radius*0.6*Math.sin(angle), obj.note || selectionOptions[obj.sel]);
      bubble.setAttribute("class","bubble");
      positionsGroup.appendChild(bubble);
    }
  }

  localStorage.setItem("minigolfSave_" + currentFacility, JSON.stringify(bowlsData));

// 👉 Bild zur aktuellen Bahn laden
loadImage();
}

// ================= BAHNWECHSEL-ANIMATION =================
function animateBowlLabel() {
  const label = document.getElementById("bowlLabel");
  label.style.color = "#000000"; 
  label.style.transform = "scale(0.5)";
  label.style.display = "inline-block";

  const anim = label.animate([
    { transform: "scale(0.5)", color: "#000000", opacity: 0 },
    { transform: "scale(1.2)", color: "#FFA500", opacity: 1 },
    { transform: "scale(1)", color: "#000000", opacity: 1 }
  ], { duration: 400, easing: "ease-out", fill: "forwards" });

  anim.onfinish = () => {
    label.style.color = "#000000";
    label.style.transform = "scale(1)";
  };
}

function animateBowlSVG() {
  const svg = document.querySelector("svg");
  svg.style.transform = "translateX(-50px)";
  svg.style.opacity = "0.7";

  svg.animate([
    { transform: "translateX(-50px)", opacity: 0.7 },
    { transform: "translateX(0px)", opacity: 1 }
  ], { duration: 400, easing: "ease-out", fill: "forwards" });
}

// ================= BUTTONS =================
document.getElementById("prevBowl").onclick = () => {

    animateBowlLabel();

    updateBowl();

document.getElementById("nextBowl").onclick = () => {

document.getElementById("saveBtn").onclick = async (e) => {

  // Pop-Animation Button
  btn.classList.remove("save-pop");   // reset, falls Animation noch läuft

  // Checkmark erstellen oder wiederverwenden

    check.className = "checkmark";

  }

  check.style.left = `${rect.left + rect.width/2}px`;

// ================= INDEXEDDB =================
let imageDB;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("minigolfImages", 1);

    request.onupgradeneeded = e => {
      imageDB = e.target.result;
      if (!imageDB.objectStoreNames.contains("images")) {
        imageDB.createObjectStore("images", { keyPath: "id" });
      }
    };

    request.onsuccess = e => {
      imageDB = e.target.result;
      resolve(imageDB);
    };

    request.onerror = e => reject(e);
  });
}

// --- Key für Pistenplan pro Anlage/User ---
function getPlanKey(facility) {
  return `plan_${facility}_${userId}`;
}

// --- IndexedDB Funktionen für Pistenplan ---
async function savePlanToDB(facility, dataURL) {
  await openDB();
  return new Promise((resolve, reject) => {
    const tx = imageDB.transaction("images", "readwrite");
    const store = tx.objectStore("images");
    store.put({ id: getPlanKey(facility), data: dataURL });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

async function loadPlanFromDB(facility) {
  await openDB();
  return new Promise((resolve, reject) => {
    const tx = imageDB.transaction("images", "readonly");
    const store = tx.objectStore("images");
    const request = store.get(getPlanKey(facility));
    request.onsuccess = () => resolve(request.result?.data);
    request.onerror = e => reject(e);
  });
}

async function deletePlanFromDB(facility) {
  await openDB();
  return new Promise((resolve, reject) => {
    const tx = imageDB.transaction("images", "readwrite");
    const store = tx.objectStore("images");

    store.delete(getPlanKey(facility));

    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

const deletePlanBtn = document.getElementById("deletePlanBtn");

deletePlanBtn.onclick = async () => {
  try {

    planPreview.src = "";

    alert("Pistenplan gelöscht 🗑️");
  } catch (err) {
    console.error(err);
    alert("Fehler beim Löschen!");
  }
};

async function loadImage() {
  try {
    const data = await loadImageFromDB(currentFacility, currentBowl);
    previewImage.src = data || "";
    previewImage.style.display = data ? "block" : "none";

    const planData = await loadPlanFromDB(currentFacility);
    planPreview.src = planData || "";
    planPreview.style.display = planData ? "block" : "none";
  } catch (err) {
    console.error("Fehler beim Laden der Bilder:", err);
  }
}

// ================= LIVE UPDATE =================
docRef.onSnapshot((snap) => {
  if (!snap.exists) return;
  const data = snap.data().allFacilities;
  if (!data) return;

  allFacilities = data;
  if (!allFacilities[currentFacility]) {
    currentFacility = Object.keys(allFacilities)[0];
    facilitySelect.value = currentFacility;
  }

  bowlsData = allFacilities[currentFacility];
  updateBowl(); // Linien + Positionen aktualisieren
  loadImage();  // aktuelle Bilder + Pistenplan laden
});
